<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{

background:#0d1117;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

font-family:Arial;

}

.card{

width:420px;

background:#161b22;

padding:35px;

border-radius:15px;

box-shadow:0 0 20px rgba(0,255,255,.35);

}

h2{

color:#00e5ff;

text-align:center;

margin-bottom:25px;

}

.form-control{

height:50px;

margin-bottom:15px;

background:#21262d;

border:1px solid #00e5ff;

color:white;

}

.form-control::placeholder{

color:#cccccc;

}

.btn{

height:50px;

font-weight:bold;

}

a{

text-decoration:none;

color:#00e5ff;

}

</style>

</head>

<body>

<div class="card">

<h2>AI SOC Dashboard</h2>

<form method="POST">

<input
type="text"
name="username"
class="form-control"
placeholder="Username"
required>

<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required>

<button class="btn btn-success w-100">

Login

</button>

</form>

<br>

<center>

<a href="/register">

Create New Account

</a>

</center>

</div>

</body>

</html>

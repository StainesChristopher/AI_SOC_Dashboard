<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#0d1117;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.card{
width:420px;
padding:35px;
background:#161b22;
border-radius:15px;
box-shadow:0 0 20px rgba(0,255,255,.3);
}

h2{
color:#00e5ff;
text-align:center;
margin-bottom:25px;
}

.form-control{
height:50px;
margin-bottom:15px;
background:#21262d;
color:white;
border:1px solid #00e5ff;
}

.form-control::placeholder{
color:#cccccc;
}

.btn{
height:50px;
font-weight:bold;
}

a{
color:#00e5ff;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<h2>Create Account</h2>

<form method="POST">

<input
type="text"
name="username"
class="form-control"
placeholder="Username"
required>

<input
type="email"
name="email"
class="form-control"
placeholder="Email"
required>

<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required>

<button class="btn btn-primary w-100">

Register

</button>

</form>

<br>

<center>

<a href="/login">

Already have an account?

</a>

</center>

</div>

</body>

</html>
